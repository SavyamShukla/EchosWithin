<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Decode Message - Echos Within</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <style>
        body {
            margin: 0;
            padding: 0;
            font-family: "Trebuchet MS", sans-serif;
            background: linear-gradient(to right, #000000, #2b0404);
            color: white;
        }
        h1 {
            text-align: center;
            height: 3cm;
            margin-top: 40px;
            color: #ff3333;
            text-shadow: 0 0 10px rgba(255, 0, 0, 0.5);
            font-size: 50px;
            letter-spacing: 2px;
            font-style: italic;
        }
        .container {
            max-width: 450px;
            margin: 40px auto;
            background: #0f0f0f;    
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 0 25px rgba(220, 20, 60, 0.4);
            border: 1px solid #330505;
            text-align: center;
        }
        form {
            margin-top: 20px;
        }
        label {
            font-size: 16px;
            display: block;
            margin-top: 20px;
            text-align: left;
            color: #ffcccc;
        }
        input[type="file"] {
            margin-top: 10px;
            width: 100%;
            color: #ccc;
        }
        button {
            margin-top: 20px;
            padding: 12px 25px;
            font-size: 16px;
            color: white;
            background-color: #991b1b;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.3s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .nav-buttons {
            display: flex;                
            justify-content: space-between;
            width: calc(100% + 60px);
            margin-left: -30px;
            margin-bottom: 20px; 
        }
        .nav-buttons button {
            margin-top: 0;
            background-color: #334155;
            color: #ffffff;
            border: 1px solid #475569;
        }
        button:hover {
            background-color: #dc2626;
            box-shadow: 0 0 15px #dc2626;
        }

        </style>
    </head>
    <body>
        <h1>Welcome to Echos Within Decoder</h1>
        <div class="container">
            <div class="nav-buttons">
             <button type="button" onclick="window.location.href='/'">Home</button>
             <button type="button" onclick="window.location.href='/encode_page'">Encoder</button>
            </div>
            <h2 style="color: #e5e5e5;">Decode Message</h2>
            
            <form action="/decode" method="POST" enctype="multipart/form-data">
                
                <label>Upload Song:</label>
                <input type="file" name="audio_file" required>

                <button type="submit">Decode Message</button>

              {% if message %}
                <label style="margin-top: 30px; color: #4ade80;">Decoded Message:</label>
                <textarea readonly style="width: 95%; height: 90px; margin-top: 10px; padding: 10px; border-radius: 6px; border: 1px solid #4ade80; resize: none; background: #000; color: #4ade80; font-family: monospace;">{{ message }}</textarea>
            {% endif %}

            {% if error %}
                <label style="margin-top: 30px; color: #ef4444;">Error:</label>
                <textarea readonly style="width: 95%; height: 60px; margin-top: 10px; padding: 10px; border-radius: 6px; border: 1px solid #7f1d1d; resize: none; background: #450a0a; color: #fecaca;">{{ error }}</textarea>
            {% endif %}

            </form>
            
        </div>
    </body>
</html>
