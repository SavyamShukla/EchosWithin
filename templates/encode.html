<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Encode Message - Echos Within</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: "Trebuchet MS", sans-serif;
            color: white;
            background: linear-gradient(-45deg, #000000, #3f0909, #0f1020, #220303);
            background-size: 400% 400%;
            animation: gradientFlow 15s ease infinite;
        }
        @keyframes gradientFlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        h1 {
            text-align: center;
            height: 3cm;
            margin-top: 40px;
            color: #ff3333;
            text-shadow: 0 0 10px rgba(255, 0, 0, 0.5);
            font-size: 50px;
            letter-spacing: 2px;
            font-style: italic;
        }

        .container {
            max-width: 450px;
            margin: 40px auto;
            background: #0f0f0f;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 0 25px rgba(220, 20, 60, 0.4);
            border: 1px solid #330505;
            text-align: center;
        }

        label {
            font-size: 16px;
            display: block;
            margin-top: 20px;
            text-align: left;
            color: #ffcccc; 
        }

        input[type="file"] {
            margin-top: 10px;
            width: 100%;
            color: #ccc;
        }

        textarea {
            width: 95%;
            height: 90px;
            margin-top: 10px;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #550000;
            resize: none;
            background: #1a1a1a;
            color: #ff3333; 
            font-family: monospace;
        }
        
        textarea:focus {
            outline: none;
            border-color: red;
            box-shadow: 0 0 5px red;
        }

        button {
            margin-top: 25px;
            align-self: center;
            width: 50%;
            padding: 12px;
            background: #991b1b;
            color: white;
            font-size: 18px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        
        .nav-buttons {
            display: flex;                
            justify-content: space-between;
            width: calc(100% + 60px);
            margin-left: -30px;
            margin-bottom: 20px; 
        }
        
        .nav-buttons button {
            margin-top: 0;
            background-color: #334155;
            color: #ffffff;
            width: 25%;
            border: 1px solid #475569;
        }
        
        .nav-buttons button:hover {
            background-color: #475569;
        }

        button[type="submit"]:hover {
            background: #dc2626; 
            box-shadow: 0 0 15px #dc2626;
        }
    </style>
</head>

<body>
    <h1>Welcome to Echos Within Encoder</h1>

    <div class="container">
        <div class="nav-buttons">
             <button type="button" onclick="window.location.href='/'">Home</button>
             <button type="button" onclick="window.location.href='/decode_page'">Decoder</button>
        </div>
        
        <h2 style="color: #e5e5e5;">Encode Message</h2>

        <form action="/encode" method="POST" enctype="multipart/form-data">
            
            <label>Upload Song:</label>
            <input type="file" name="audio_file" required>

            <label>Enter the secret message:</label>
            <textarea name="message" required placeholder="Type your classified intel here..."></textarea>

            <button type="submit">Encode</button>
        </form>
    </div>

</body>
</html>
